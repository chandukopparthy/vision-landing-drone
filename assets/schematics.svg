<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Glow effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtle-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .bg { fill: #f3f4f6; }
    .grid { stroke: rgba(31, 41, 55, 0.025); stroke-width: 1; }
    .box { fill: #ffffff; stroke: rgba(0, 0, 0, 0.08); stroke-width: 1.5; rx: 8px; }
    .box-accent { fill: rgba(31, 41, 55, 0.02); stroke: #1f2937; stroke-width: 1.5; rx: 8px; filter: url(#subtle-glow); }
    .text-title { font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 700; fill: #111827; letter-spacing: 1px; }
    .text-accent-title { font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 700; fill: #1f2937; letter-spacing: 1px; }
    .text-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #6b7280; }
    .text-item { font-family: 'Outfit', sans-serif; font-size: 12px; fill: #111827; }
    .text-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #1f2937; font-weight: bold; }
    .flow-line { stroke: rgba(31, 41, 55, 0.2); stroke-width: 2; stroke-dasharray: 4, 4; fill: none; }
    .flow-line-active { stroke: #1f2937; stroke-width: 2.5; fill: none; filter: url(#subtle-glow); }
    .arrow { fill: #1f2937; }
    .arrow-dim { fill: rgba(31, 41, 55, 0.2); }
    .sensor-node { fill: #ffffff; stroke: #1d4ed8; stroke-width: 1.2; rx: 4px; }
    .actuator-node { fill: #ffffff; stroke: #b91c1c; stroke-width: 1.2; rx: 4px; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />

  <!-- Grid lines -->
  <g>
    <line x1="50" y1="0" x2="50" y2="500" class="grid" />
    <line x1="100" y1="0" x2="100" y2="500" class="grid" />
    <line x1="150" y1="0" x2="150" y2="500" class="grid" />
    <line x1="200" y1="0" x2="200" y2="500" class="grid" />
    <line x1="250" y1="0" x2="250" y2="500" class="grid" />
    <line x1="300" y1="0" x2="300" y2="500" class="grid" />
    <line x1="350" y1="0" x2="350" y2="500" class="grid" />
    <line x1="400" y1="0" x2="400" y2="500" class="grid" />
    <line x1="450" y1="0" x2="450" y2="500" class="grid" />
    <line x1="500" y1="0" x2="500" y2="500" class="grid" />
    <line x1="550" y1="0" x2="550" y2="500" class="grid" />
    <line x1="600" y1="0" x2="600" y2="500" class="grid" />
    <line x1="650" y1="0" x2="650" y2="500" class="grid" />
    <line x1="700" y1="0" x2="700" y2="500" class="grid" />
    <line x1="750" y1="0" x2="750" y2="500" class="grid" />
    
    <line x1="0" y1="50" x2="800" y2="50" class="grid" />
    <line x1="0" y1="100" x2="800" y2="100" class="grid" />
    <line x1="0" y1="150" x2="800" y2="150" class="grid" />
    <line x1="0" y1="200" x2="800" y2="200" class="grid" />
    <line x1="0" y1="250" x2="800" y2="250" class="grid" />
    <line x1="0" y1="300" x2="800" y2="300" class="grid" />
    <line x1="0" y1="350" x2="800" y2="350" class="grid" />
    <line x1="0" y1="400" x2="800" y2="400" class="grid" />
    <line x1="0" y1="450" x2="800" y2="450" class="grid" />
  </g>

  <!-- Flow Lines -->
  <!-- Cloud telemetry to Edge Node -->
  <path d="M 230 250 L 310 250" class="flow-line-active" />
  <polygon points="310,250 300,245 300,255" class="arrow" />

  <!-- Action from Edge Node back to Actuators -->
  <path d="M 520 250 L 590 250" class="flow-line-active" />
  <polygon points="590,250 580,245 580,255" class="arrow" />

  <!-- Sensory feedback flows -->
  <path d="M 600 340 L 300 440 L 130 380 L 130 320" class="flow-line" />
  <polygon points="130,320 125,330 135,330" class="arrow-dim" />

  <!-- 1. Afferens API Box (Left) -->
  <g transform="translate(30, 80)">
    <rect width="200" height="280" class="box-accent" />
    <text x="15" y="30" class="text-accent-title">AFFERENS CLOUD</text>
    <text x="15" y="45" class="text-sub">API Perception Layer</text>
    <line x1="15" y1="55" x2="185" y2="55" stroke="rgba(31, 41, 55, 0.15)" stroke-width="1" />

    <!-- Modalities list -->
    <g transform="translate(15, 70)">
      <!-- Vision -->
      <rect width="170" height="38" class="sensor-node" />
      <text x="10" y="24" class="text-item">VISION MODALITY</text>
      <text x="130" y="24" class="text-label" fill="#1d4ed8">14 S-T</text>
      
      <!-- Spatial -->
      <rect y="48" width="170" height="38" class="sensor-node" />
      <text x="10" y="72" class="text-item">SPATIAL MODALITY</text>
      <text x="130" y="72" class="text-label" fill="#1d4ed8">10 S-T</text>

      <!-- Environmental -->
      <rect y="96" width="170" height="38" class="sensor-node" />
      <text x="10" y="120" class="text-item">ENVIRONMENTAL</text>
      <text x="130" y="120" class="text-label" fill="#1d4ed8">6 S-T</text>

      <!-- Interoception -->
      <rect y="144" width="170" height="38" class="sensor-node" />
      <text x="10" y="168" class="text-item">INTEROCEPTION</text>
      <text x="130" y="168" class="text-label" fill="#1d4ed8">5 S-T</text>
    </g>
  </g>

  <!-- 2. AegisNode Client Agent (Center) -->
  <g transform="translate(300, 80)">
    <rect width="220" height="280" class="box" />
    <text x="20" y="30" class="text-title">DRONE AGENT</text>
    <text x="20" y="45" class="text-sub">Closed-Loop Decision Core</text>
    <line x1="20" y1="55" x2="200" y2="55" stroke="rgba(0, 0, 0, 0.08)" stroke-width="1" />

    <!-- Modules -->
    <g transform="translate(15, 70)">
      <!-- Perception Aggregator -->
      <rect width="190" height="50" fill="#ffffff" stroke="rgba(0,0,0,0.08)" />
      <text x="15" y="22" class="text-item" style="font-weight:bold;">Perception Aggregator</text>
      <text x="15" y="38" class="text-sub">Validates multi-frame confidence</text>
      
      <!-- AI Decision Matrix -->
      <rect y="65" width="190" height="85" fill="rgba(31, 41, 55, 0.01)" stroke="rgba(31, 41, 55, 0.15)" />
      <text x="15" y="87" class="text-item" style="font-weight:bold;">Intelligent Reasoning</text>
      <text x="15" y="105" class="text-sub">Descent logic &amp; safety matrices</text>
      <text x="15" y="120" class="text-sub">Evaluates wind &amp; battery limits</text>
      <text x="15" y="135" class="text-sub">Pipes thoughts to CLI console</text>

      <!-- Actuation Controller -->
      <rect y="165" width="190" height="50" fill="#ffffff" stroke="rgba(0,0,0,0.08)" />
      <text x="15" y="187" class="text-item" style="font-weight:bold;">Actuator Controller</text>
      <text x="15" y="203" class="text-sub">Triggers landing descent relays</text>
    </g>
  </g>

  <!-- 3. Hardware Relays / Devices (Right) -->
  <g transform="translate(580, 80)">
    <rect width="190" height="280" class="box" />
    <text x="15" y="30" class="text-title">FLIGHT NODE</text>
    <text x="15" y="45" class="text-sub">Physical Drone Hardware</text>
    <line x1="15" y1="55" x2="175" y2="55" stroke="rgba(0, 0, 0, 0.08)" stroke-width="1" />

    <!-- Devices -->
    <g transform="translate(15, 70)">
      <!-- Rotors -->
      <rect width="160" height="42" class="actuator-node" />
      <text x="10" y="25" class="text-item" style="font-weight:bold; fill:#b91c1c;">1. Rotors Motors</text>
      <text x="110" y="25" class="text-sub">Speed PWM</text>

      <!-- Landing gear -->
      <rect y="57" width="160" height="42" class="actuator-node" />
      <text x="10" y="82" class="text-item" style="font-weight:bold; fill:#b91c1c;">2. Landing Gear</text>
      <text x="110" y="82" class="text-sub">Deploy Servo</text>

      <!-- Beacon -->
      <rect y="114" width="160" height="42" class="actuator-node" />
      <text x="10" y="139" class="text-item" style="font-weight:bold; fill:#b91c1c;">3. Warning Beacon</text>
      <text x="110" y="139" class="text-sub">Alert Strobe</text>

      <!-- Autopilot -->
      <rect y="171" width="160" height="42" class="actuator-node" />
      <text x="10" y="196" class="text-item" style="font-weight:bold; fill:#b91c1c;">4. Autoland Relay</text>
      <text x="110" y="196" class="text-sub">Flight override</text>
    </g>
  </g>

  <!-- Labels -->
  <text x="270" y="235" class="text-label" text-anchor="middle">Telemetry JSON</text>
  <text x="555" y="235" class="text-label" text-anchor="middle" fill="#b91c1c">Actuation</text>
  <text x="400" y="480" class="text-sub" text-anchor="middle">Physical feedback loops close the gap between software intelligence and drone operations</text>
</svg>
